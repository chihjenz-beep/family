<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>家庭記事本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F4EE; --card:#FFFFFF; --ink:#3E3A36; --ink-soft:#8B857C;
  --line:#E7E2D8; --grid:rgba(120,110,95,.07);
  --dad:#4A7BA6; --mom:#D9636C; --chien:#E08FB0; --hsiang:#6BA368;
  --pin:#E8B84B;
  --radius:14px;
  --shadow:0 2px 10px rgba(90,80,60,.10);
  --nav-h:62px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Sans TC',-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;
  color:var(--ink);
  background:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:24px 24px;
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--dad);outline-offset:2px}
.hidden{display:none!important}

/* ===== 成員選擇 ===== */
#screenSelect{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.select-title{font-size:26px;font-weight:900;letter-spacing:2px;margin-bottom:6px}
.select-sub{color:var(--ink-soft);font-size:14px;margin-bottom:34px}
.avatar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;width:100%;max-width:340px}
.avatar-btn{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:22px 10px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;
  position:relative;transition:transform .15s;
}
.avatar-btn:active{transform:scale(.96)}
.avatar-btn::before{ /* 和紙膠帶 */
  content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%) rotate(-3deg);
  width:56px;height:16px;border-radius:2px;opacity:.75;background:var(--tape);
}
.avatar-circle{
  width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:900;color:#fff;background:var(--tape);
}
.avatar-name{font-weight:700;font-size:16px}
.avatar-role{font-size:11px;color:var(--ink-soft)}

/* ===== 主框架 ===== */
#app{padding-bottom:calc(var(--nav-h) + 18px)}
header{
  position:sticky;top:0;z-index:20;
  background:rgba(246,244,238,.92);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
}
.head-title{font-size:19px;font-weight:900;letter-spacing:1.5px}
.head-date{font-size:11px;color:var(--ink-soft);margin-top:1px}
.user-chip{
  display:flex;align-items:center;gap:7px;background:var(--card);
  border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 6px;
  box-shadow:var(--shadow);font-size:13px;font-weight:700;
}
.user-chip .dot{width:26px;height:26px;border-radius:50%;color:#fff;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center}
main{max-width:560px;margin:0 auto;padding:16px}

/* ===== 今日摘要卡 ===== */
.summary-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:18px 18px 14px;margin-bottom:22px;position:relative;
}
.summary-card::before{
  content:'';position:absolute;top:-9px;left:22px;width:72px;height:18px;border-radius:2px;
  background:repeating-linear-gradient(45deg,var(--pin),var(--pin) 6px,rgba(255,255,255,.45) 6px,rgba(255,255,255,.45) 12px);
  opacity:.8;transform:rotate(-2deg);
}
.summary-date{font-size:20px;font-weight:900}
.summary-week{font-size:13px;color:var(--ink-soft);margin-left:8px}
.summary-row{display:flex;gap:10px;align-items:flex-start;margin-top:12px;font-size:14px;line-height:1.55}
.summary-icon{flex:0 0 auto;font-size:16px;margin-top:1px}
.summary-row .lab{font-weight:700;margin-right:4px}
.summary-empty{color:var(--ink-soft)}
.anni-count{color:var(--mom);font-weight:900}

/* ===== 留言牆 ===== */
.section-head{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px}
.section-title{font-size:16px;font-weight:900;letter-spacing:1px}
.btn-primary{
  background:var(--ink);color:#fff;border-radius:999px;padding:8px 18px;
  font-size:14px;font-weight:700;box-shadow:var(--shadow);
}
.notes{display:flex;flex-direction:column;gap:16px}
.note{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px 16px 12px;position:relative;
}
.note:nth-child(odd){transform:rotate(-.6deg)}
.note:nth-child(even){transform:rotate(.5deg)}
.note.pinned{border:1.5px solid var(--pin)}
.note-tape{
  position:absolute;top:-8px;left:50%;transform:translateX(-50%) rotate(-2deg);
  width:64px;height:15px;border-radius:2px;opacity:.7;
}
.note-pin{position:absolute;top:-10px;right:12px;font-size:18px}
.note-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.note-author{display:flex;align-items:center;gap:6px;font-weight:700;font-size:13px}
.note-author .dot{width:20px;height:20px;border-radius:50%;color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center}
.note-to{font-size:11px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--ink-soft)}
.note-time{font-size:11px;color:var(--ink-soft);margin-left:auto}
.note-content{font-size:15px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.note-foot{display:flex;align-items:center;margin-top:10px;gap:8px}
.read-dots{display:flex;gap:3px;align-items:center}
.read-dots .rd{width:9px;height:9px;border-radius:50%;opacity:.25}
.read-dots .rd.on{opacity:1}
.read-label{font-size:11px;color:var(--ink-soft)}
.note-del{margin-left:auto;font-size:12px;color:var(--ink-soft);padding:4px 8px;border-radius:8px}
.note-del:active{background:var(--paper)}
.empty-box{
  text-align:center;color:var(--ink-soft);font-size:14px;padding:44px 16px;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);line-height:1.8;
}
.empty-box .big{font-size:34px;display:block;margin-bottom:8px}

/* ===== 底部導航 ===== */
nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);z-index:30;
  background:var(--card);border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -2px 12px rgba(90,80,60,.08);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:11px;color:var(--ink-soft);font-weight:500}
.nav-btn .ic{font-size:20px}
.nav-btn.active{color:var(--ink);font-weight:900}

/* ===== 撰寫留言 modal ===== */
.modal-mask{position:fixed;inset:0;background:rgba(60,54,45,.45);z-index:40;display:flex;align-items:flex-end;justify-content:center}
.modal{
  background:var(--card);width:100%;max-width:560px;border-radius:18px 18px 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));
}
.modal h3{font-size:17px;font-weight:900;margin-bottom:14px}
.modal textarea{
  width:100%;min-height:110px;border:1.5px solid var(--line);border-radius:10px;
  padding:12px;font-family:inherit;font-size:15px;resize:vertical;background:var(--paper);
}
.field-lab{font-size:13px;font-weight:700;margin:14px 0 8px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:1.5px solid var(--line);border-radius:999px;padding:6px 14px;font-size:13px;
  background:var(--card);color:var(--ink-soft);font-weight:700;
}
.chip.on{border-color:var(--ink);color:var(--ink);background:var(--paper)}
.pin-row{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:14px;font-weight:700}
.pin-row input{width:18px;height:18px;accent-color:var(--pin)}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-ghost{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-size:15px;font-weight:700;color:var(--ink-soft)}
.btn-send{flex:2;background:var(--ink);color:#fff;border-radius:12px;padding:12px;font-size:15px;font-weight:900}
.btn-send:disabled{opacity:.4}

/* ===== 行事曆 ===== */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{width:36px;height:36px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;color:var(--ink)}
.cal-nav-btn:active{transform:scale(.92)}
.cal-title{font-size:18px;font-weight:900;letter-spacing:1px}
.cal-actions{display:flex;gap:8px;margin-bottom:14px}
.cal-actions .chip{border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:700;background:var(--card);box-shadow:var(--shadow);color:var(--ink-soft);border:none}
.cal-actions .chip:active{transform:scale(.95)}
.cal-weekrow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-weekrow div{text-align:center;font-size:11px;color:var(--ink-soft);font-weight:700;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px}
.cal-day{
  aspect-ratio:1/1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:5px 2px 3px;font-size:12.5px;position:relative;background:transparent;color:var(--ink);
}
.cal-day.other{opacity:.28}
.cal-day.today{background:var(--paper);font-weight:900}
.cal-day.today .cal-num{color:var(--dad)}
.cal-day.has-anni{box-shadow:inset 0 0 0 1.4px var(--pin)}
.cal-day:active{background:var(--paper)}
.cal-num{font-weight:700;line-height:1}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:4px;max-width:34px}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-dot.all{background:var(--ink)}
.cal-anni-mark{position:absolute;top:2px;right:3px;font-size:9px}
.cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding:0 4px}
.cal-legend .lg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-soft)}
.cal-legend .lg .dot{width:9px;height:9px;border-radius:50%}

/* 行程/紀念日條目卡片 */
.item-card{background:var(--paper);border-radius:10px;padding:12px 12px 10px;margin-bottom:10px;border:1px solid var(--line)}
.item-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.item-title{font-weight:700;font-size:15px;flex:1}
.item-who{display:flex;gap:3px}
.item-who .dot{width:16px;height:16px;border-radius:50%;color:#fff;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}
.item-note{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin-top:2px}
.item-foot{display:flex;align-items:center;gap:10px;margin-top:8px}
.item-foot .lnk{font-size:12px;color:var(--ink-soft);padding:3px 8px;border-radius:8px}
.item-foot .lnk:active{background:#fff}
.item-anni-count{font-size:12px;font-weight:900;color:var(--mom);margin-left:auto}
.anni-past{color:var(--ink-soft);font-weight:400}

/* ===== 待辦 / 購物清單共用清單樣式 ===== */
.list-header{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px}
.todo-row{
  background:var(--card);border-radius:12px;box-shadow:var(--shadow);
  padding:14px 14px;display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;
}
.todo-row.done{opacity:.5}
.todo-check{
  flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;margin-top:1px;
}
.todo-check.on{background:var(--hsiang);border-color:var(--hsiang)}
.todo-body{flex:1;min-width:0}
.todo-title{font-size:15px;font-weight:700;line-height:1.4}
.todo-row.done .todo-title{text-decoration:line-through}
.todo-meta{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}
.todo-who{display:flex;gap:3px}
.todo-who .dot{width:18px;height:18px;border-radius:50%;color:#fff;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center}
.todo-badge{font-size:11px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--ink-soft)}
.todo-edit{flex:0 0 auto;font-size:16px;color:var(--ink-soft);padding:4px 6px}
.section-sub{font-size:12px;color:var(--ink-soft);font-weight:700;margin:16px 2px 8px;letter-spacing:1px}

/* ===== 購物清單 ===== */
.shop-add-bar{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:12px 14px;margin-bottom:16px;
}
.shop-add-input{
  width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;
  font-family:inherit;font-size:15px;background:var(--paper);margin-bottom:10px;
}
.shop-cat-row{display:flex;gap:8px}
.shop-cat-chip{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:8px 4px;font-size:12.5px;font-weight:700;color:var(--ink-soft);text-align:center;background:var(--paper)}
.shop-cat-chip.on{border-color:var(--ink);color:var(--ink);background:#fff}
.shop-group-title{font-size:12.5px;font-weight:900;color:var(--ink-soft);margin:4px 2px 8px;display:flex;align-items:center;gap:5px}
.shop-item{
  background:var(--card);border-radius:11px;box-shadow:var(--shadow);
  padding:11px 14px;display:flex;align-items:center;gap:11px;margin-bottom:8px;
}
.shop-item.bought{opacity:.45}
.shop-item .todo-check{width:22px;height:22px}
.shop-name{flex:1;font-size:14.5px;font-weight:600}
.shop-item.bought .shop-name{text-decoration:line-through}
.shop-del{font-size:15px;color:var(--ink-soft);padding:4px 6px}

/* ===== toast / banner ===== */
#toast{
  position:fixed;left:50%;bottom:calc(var(--nav-h) + 24px);transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;
  z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88%;text-align:center;
}
#toast.show{opacity:.95}
.banner{
  background:#FDF3DC;border:1px solid #EED9A4;color:#8A6D2F;font-size:12.5px;
  border-radius:10px;padding:9px 12px;margin-bottom:14px;line-height:1.5;
}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:#C9C2B4}
.sync-dot.ok{background:var(--hsiang)}
.sync-dot.err{background:var(--mom)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<!-- 成員選擇 -->
<div id="screenSelect">
  <div class="select-title">家庭記事本</div>
  <div class="select-sub">今天是誰呢？點一下自己的頭像</div>
  <div class="avatar-grid" id="avatarGrid"></div>
</div>

<!-- 主畫面 -->
<div id="app" class="hidden">
  <header>
    <div>
      <div class="head-title">家庭記事本</div>
      <div class="head-date" id="headDate"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="cal-nav-btn" id="btnManualRefresh" title="重新整理">⟳</button>
      <button class="user-chip" id="userChip" title="切換成員"></button>
    </div>
  </header>

  <main>
    <div id="syncBanner"></div>

    <!-- 首頁 -->
    <div id="viewHome">
      <div class="summary-card" id="summaryCard"></div>
      <div class="section-head">
        <div class="section-title">📌 家庭留言板</div>
        <button class="btn-primary" id="btnCompose">＋ 留言</button>
      </div>
      <div class="notes" id="noteWall"></div>
    </div>

    <!-- 佔位頁 -->
    <div id="viewCalendar" class="hidden">
      <div class="cal-header">
        <button class="cal-nav-btn" id="calPrev">‹</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav-btn" id="calNext">›</button>
      </div>
      <div class="cal-actions">
        <button class="chip" id="calToday">📍 回到今天</button>
        <button class="chip" id="btnAnniList">🎂 紀念日</button>
      </div>
      <div class="cal-weekrow"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend" id="calLegend"></div>
    </div>
    <div id="viewTodo" class="hidden">
      <div class="list-header">
        <div class="section-title">✅ 待辦與家事分工</div>
        <button class="btn-primary" id="btnAddTodo">＋ 新增</button>
      </div>
      <div id="todoActiveList"></div>
      <div id="todoDoneWrap"></div>
    </div>
    <div id="viewShopping" class="hidden">
      <div class="list-header"><div class="section-title">🛒 購物清單</div></div>
      <div class="shop-add-bar">
        <input type="text" id="shopInput" class="shop-add-input" placeholder="輸入品項，按 Enter 加入清單" maxlength="40">
        <div class="shop-cat-row" id="shopCatRow"></div>
      </div>
      <div id="shopList"></div>
    </div>
  </main>

  <nav>
    <button class="nav-btn active" data-view="Home"><span class="ic">🏠</span>首頁</button>
    <button class="nav-btn" data-view="Calendar"><span class="ic">📅</span>行事曆</button>
    <button class="nav-btn" data-view="Todo"><span class="ic">✅</span>待辦</button>
    <button class="nav-btn" data-view="Shopping"><span class="ic">🛒</span>購物</button>
  </nav>
</div>

<!-- 撰寫留言 -->
<div class="modal-mask hidden" id="composeMask">
  <div class="modal">
    <h3>寫一張留言</h3>
    <textarea id="composeText" maxlength="500" placeholder="想跟家人說什麼呢？"></textarea>
    <div class="field-lab">給誰看</div>
    <div class="chip-row" id="composeTo"></div>
    <label class="pin-row hidden" id="pinRow"><input type="checkbox" id="composePin">📍 置頂公告（家長）</label>
    <div class="modal-actions">
      <button class="btn-ghost" id="btnCancelCompose">取消</button>
      <button class="btn-send" id="btnSendCompose">貼上留言牆</button>
    </div>
  </div>
</div>

<!-- 日期詳情 -->
<div class="modal-mask hidden" id="dayMask">
  <div class="modal">
    <h3 id="dayModalTitle"></h3>
    <div id="dayAnniBanner"></div>
    <div id="dayEventList"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="btnCloseDay">關閉</button>
      <button class="btn-send" id="btnAddEventInDay">＋ 新增行程</button>
    </div>
  </div>
</div>

<!-- 新增/編輯行程 -->
<div class="modal-mask hidden" id="eventMask">
  <div class="modal">
    <h3 id="eventModalTitle">新增行程</h3>
    <input type="text" id="eventTitle" maxlength="60" placeholder="行程標題，例如：牙醫回診"
      style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-family:inherit;font-size:15px;background:var(--paper)">
    <div class="field-lab">日期</div>
    <input type="date" id="eventDate" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px;font-family:inherit;font-size:15px;background:var(--paper)">
    <div class="field-lab">誰的行程</div>
    <div class="chip-row" id="eventWho"></div>
    <div class="field-lab">備註（選填）</div>
    <textarea id="eventNote" maxlength="200" style="min-height:60px;width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:14px;background:var(--paper)"></textarea>
    <div class="modal-actions">
      <button class="btn-ghost" id="btnCancelEvent">取消</button>
      <button class="btn-send" id="btnSaveEvent">儲存</button>
    </div>
    <div id="eventDeleteRow" class="hidden" style="text-align:center;margin-top:12px">
      <button style="color:var(--mom);font-size:13px;font-weight:700" id="btnDeleteEvent">🗑 刪除這個行程</button>
    </div>
  </div>
</div>

<!-- 紀念日管理 -->
<div class="modal-mask hidden" id="anniMask">
  <div class="modal">
    <h3>🎂 紀念日</h3>
    <div id="anniList"></div>
    <div id="anniAddArea"></div>
  </div>
</div>

<!-- 新增/編輯待辦 -->
<div class="modal-mask hidden" id="todoMask">
  <div class="modal">
    <h3 id="todoModalTitle">新增待辦</h3>
    <input type="text" id="todoTitle" maxlength="60" placeholder="待辦事項，例如：倒垃圾"
      style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-family:inherit;font-size:15px;background:var(--paper)">
    <div class="field-lab">指派給</div>
    <div class="chip-row" id="todoWho"></div>
    <div class="field-lab">重複</div>
    <div class="chip-row" id="todoRepeat"></div>

      <button class="btn-ghost" id="btnCancelTodo">取消</button>
      <button class="btn-send" id="btnSaveTodo">儲存</button>

      <button style="color:var(--mom);font-size:13px;font-weight:700" id="btnDeleteTodo">🗑 刪除這個待辦</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ================== 設定 ================== */
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxYIHFdMkVjllhPI9MdsshJFGalW8kO2OUD4O_Vl8ZtIf3GpsWASVXIxvte76IywPJfVA/exec'; // 家庭記事本正式後端，勿改回空值
var LS_KEY  = 'family_notebook_v1';
var LS_USER = 'family_notebook_user';

var DEFAULT_MEMBERS = [
  {id:'dad',    name:'爸爸', role:'admin',  color:'#4A7BA6'},
  {id:'mom',    name:'媽媽', role:'admin',  color:'#D9636C'},
  {id:'chien',  name:'芊芊', role:'member', color:'#E08FB0'},
  {id:'hsiang', name:'翔翔', role:'member', color:'#6BA368'}
];

/* ================== 狀態 ================== */
var state = {members:DEFAULT_MEMBERS.slice(), messages:[], events:[], todos:[], shopping:[], anniversaries:[]};
var currentUser = null;
var _gasLoaded = false;          // 雲端資料載入前禁止寫入（GAS 模式）
var _syncStatus = GAS_URL ? 'loading' : 'local';

/* ================== 工具 ================== */
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function pad(n){return (n<10?'0':'')+n}
function nowStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds())}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function genId(p){return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}
function memberOf(id){for(var i=0;i<state.members.length;i++){if(state.members[i].id===id)return state.members[i]}return {id:id,name:id,role:'member',color:'#AAA'}}
function isAdmin(){return currentUser && memberOf(currentUser).role==='admin'}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show')},2400)}
function timeLabel(ts){ // 今天顯示 HH:mm，其他顯示 M/D
  if(!ts)return'';var dPart=ts.slice(0,10);
  if(dPart===todayStr())return ts.slice(11,16);
  var p=dPart.split('-');return (+p[1])+'/'+(+p[2]);
}

/* ================== localStorage ================== */
function loadLocal(){
  try{var raw=localStorage.getItem(LS_KEY);if(raw){var d=JSON.parse(raw);
    ['members','messages','events','todos','shopping','anniversaries'].forEach(function(k){if(Array.isArray(d[k]))state[k]=d[k]});
  }}catch(e){}
  currentUser=localStorage.getItem(LS_USER)||null;
}
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(state))}catch(e){toast('本機儲存空間不足')}}

/* ================== GAS 同步 ================== */
function gasGet(action,params){
  var q=Object.assign({action:action},params||{});
  var qs=Object.keys(q).map(function(k){return k+'='+encodeURIComponent(q[k])}).join('&');
  return fetch(GAS_URL+'?'+qs).then(function(r){return r.json()});
}
function gasPost(action,data){
  return fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:action,user:currentUser,data:data})
  }).then(function(r){return r.json()});
}
function fetchAll(){
  if(!GAS_URL){_syncStatus='local';renderBanner();return}
  _syncStatus='loading';renderBanner();
  gasGet('getAll').then(function(res){
    if(res&&res.ok&&res.data){
      ['members','messages','events','todos','shopping','anniversaries'].forEach(function(k){
        if(Array.isArray(res.data[k])&&res.data[k].length||k!=='members'){state[k]=res.data[k]||[]}
      });
      if(!state.members.length)state.members=DEFAULT_MEMBERS.slice();
      _gasLoaded=true;_syncStatus='ok';saveLocal();renderAll();
    }else{_syncStatus='err';renderBanner();toast('雲端資料格式錯誤')}
  }).catch(function(){_syncStatus='err';renderBanner();toast('無法連線雲端，顯示本機資料')});
}
function canWrite(){
  if(GAS_URL&&!_gasLoaded){toast('雲端資料載入中，請稍候再操作');return false}
  return true;
}
function pushWrite(action,data){
  if(!GAS_URL)return; // 本機模式
  gasPost(action,data).then(function(res){
    if(!(res&&res.ok)){_syncStatus='err';renderBanner();toast('雲端同步失敗，資料暫存本機')}
  }).catch(function(){_syncStatus='err';renderBanner();toast('雲端同步失敗，資料暫存本機')});
}

/* ================== 成員選擇 ================== */
function renderSelect(){
  var g=$('avatarGrid');g.innerHTML='';
  state.members.forEach(function(m){
    var b=document.createElement('button');
    b.className='avatar-btn';b.style.setProperty('--tape',m.color);
    b.innerHTML='<div class="avatar-circle">'+esc(m.name.charAt(0))+'</div>'+
      '<div class="avatar-name">'+esc(m.name)+'</div>'+
      '<div class="avatar-role">'+(m.role==='admin'?'家長':'小幫手')+'</div>';
    b.onclick=function(){chooseUser(m.id)};
    g.appendChild(b);
  });
}
function chooseUser(id){
  currentUser=id;localStorage.setItem(LS_USER,id);
  $('screenSelect').classList.add('hidden');$('app').classList.remove('hidden');
  renderAll();markVisibleRead();
}

/* ================== 畫面渲染 ================== */
function renderBanner(){
  var el=$('syncBanner');if(!el)return;
  if(!GAS_URL){
    el.innerHTML='<div class="banner">⚙️ 尚未設定 GAS 後端 — 目前為<b>本機模式</b>，資料只存在這台裝置。部署 Code.gs 後把 Web App URL 貼進 GAS_URL 即可全家同步。</div>';
  }else if(_syncStatus==='err'){
    el.innerHTML='<div class="banner"><span class="sync-dot err"></span>雲端連線異常，顯示本機快取。<u onclick="fetchAll()" style="cursor:pointer">點此重試</u></div>';
  }else{el.innerHTML=''}
}
function renderHeader(){
  var d=new Date(),wk=['日','一','二','三','四','五','六'];
  $('headDate').textContent=d.getFullYear()+' 年 '+(d.getMonth()+1)+' 月 '+d.getDate()+' 日（'+wk[d.getDay()]+'）';
  var m=memberOf(currentUser);
  $('userChip').innerHTML='<span class="dot" style="background:'+m.color+'">'+esc(m.name.charAt(0))+'</span>'+esc(m.name)+' ▾';
}
function nextAnniversary(){
  var best=null,today=new Date();today.setHours(0,0,0,0);
  activeAnni().forEach(function(a){
    if(!a.date)return;var p=a.date.split('-');if(p.length<3)return;
    var d=new Date(today.getFullYear(),+p[1]-1,+p[2]);
    if(a.repeat==='Y'||a.repeat===true||a.repeat==='true'){if(d<today)d=new Date(today.getFullYear()+1,+p[1]-1,+p[2])}
    else{d=new Date(+p[0],+p[1]-1,+p[2]);if(d<today)return}
    var diff=Math.round((d-today)/86400000);
    if(best===null||diff<best.diff)best={name:a.name,diff:diff};
  });
  return best;
}
function renderSummary(){
  var d=new Date(),wk=['日','一','二','三','四','五','六'];
  var html='<div><span class="summary-date">'+(d.getMonth()+1)+' 月 '+d.getDate()+' 日</span><span class="summary-week">星期'+wk[d.getDay()]+'</span></div>';
  // 今日行程
  var tEvents=state.events.filter(function(e){return e.date===todayStr()&&e.status!=='deleted'});
  html+='<div class="summary-row"><span class="summary-icon">📅</span><div><span class="lab">今日行程</span>'+
    (tEvents.length?esc(tEvents.map(function(e){return e.title}).join('、')):'<span class="summary-empty">今天沒有安排</span>')+'</div></div>';
  // 我的待辦
  var myTodos=activeTodos().filter(function(t){return (t.assignee===currentUser||t.assignee==='all')&&!isTodoDoneNow(t)});
  html+='<div class="summary-row"><span class="summary-icon">✅</span><div><span class="lab">我的待辦</span>'+
    (myTodos.length?esc(myTodos.length+' 項未完成'):'<span class="summary-empty">都完成了，真棒</span>')+'</div></div>';
  // 紀念日
  var anni=nextAnniversary();
  html+='<div class="summary-row"><span class="summary-icon">🎂</span><div><span class="lab">紀念日</span>'+
    (anni?(anni.diff===0?'今天是 <b>'+esc(anni.name)+'</b>！🎉':'距離 '+esc(anni.name)+' 還有 <span class="anni-count">'+anni.diff+'</span> 天'):'<span class="summary-empty">尚未設定紀念日</span>')+'</div></div>';
  // 未讀留言
  var unread=visibleMessages().filter(function(m){return m.author!==currentUser&&(m.readBy||[]).indexOf(currentUser)===-1}).length;
  html+='<div class="summary-row"><span class="summary-icon">📌</span><div><span class="lab">留言板</span>'+
    (unread?'<b>'+unread+'</b> 則新留言':'<span class="summary-empty">沒有未讀留言</span>')+'</div></div>';
  var shopLeft=activeShop().filter(function(s){return s.bought!=='Y'}).length;
  html+='<div class="summary-row"><span class="summary-icon">🛒</span><div><span class="lab">購物清單</span>'+
    (shopLeft?'還有 <b>'+shopLeft+'</b> 項待買':'<span class="summary-empty">清單是空的</span>')+'</div></div>';
  $('summaryCard').innerHTML=html;
}
function visibleMessages(){
  return state.messages.filter(function(m){
    if(m.status==='deleted')return false;
    var to=m.to||['all'];
    return to.indexOf('all')>-1||to.indexOf(currentUser)>-1||m.author===currentUser;
  });
}
function renderWall(){
  var list=visibleMessages().slice().sort(function(a,b){
    if((a.pinned==='Y')!==(b.pinned==='Y'))return a.pinned==='Y'?-1:1;
    return (b.time||'').localeCompare(a.time||'');
  });
  var w=$('noteWall');
  if(!list.length){w.innerHTML='<div class="empty-box"><span class="big">📝</span>留言牆還空空的<br>按右上角「＋ 留言」寫下第一張吧</div>';return}
  w.innerHTML='';
  list.forEach(function(m){
    var au=memberOf(m.author);
    var to=m.to||['all'];
    var toLabel=to.indexOf('all')>-1?'':'給 '+to.map(function(id){return memberOf(id).name}).join('、');
    var dots=state.members.map(function(mm){
      if(mm.id===m.author)return'';
      var on=(m.readBy||[]).indexOf(mm.id)>-1;
      return '<span class="rd'+(on?' on':'')+'" style="background:'+mm.color+'" title="'+esc(mm.name)+(on?' 已讀':' 未讀')+'"></span>';
    }).join('');
    var readCount=(m.readBy||[]).filter(function(id){return id!==m.author}).length;
    var canDel=isAdmin()||m.author===currentUser;
    var div=document.createElement('div');
    div.className='note'+(m.pinned==='Y'?' pinned':'');
    div.innerHTML=
      '<div class="note-tape" style="background:'+au.color+'"></div>'+
      (m.pinned==='Y'?'<div class="note-pin">📍</div>':'')+
      '<div class="note-meta">'+
        '<span class="note-author"><span class="dot" style="background:'+au.color+'">'+esc(au.name.charAt(0))+'</span>'+esc(au.name)+'</span>'+
        (toLabel?'<span class="note-to">'+esc(toLabel)+'</span>':'')+
        '<span class="note-time">'+esc(timeLabel(m.time))+'</span>'+
      '</div>'+
      '<div class="note-content">'+esc(m.content)+'</div>'+
      '<div class="note-foot">'+
        '<span class="read-dots">'+dots+'</span><span class="read-label">已讀 '+readCount+'/'+(state.members.length-1)+'</span>'+
        (canDel?'<button class="note-del" data-del="'+esc(m.id)+'">🗑 刪除</button>':'')+
      '</div>';
    w.appendChild(div);
  });
  w.querySelectorAll('[data-del]').forEach(function(b){
    b.onclick=function(){delMessage(b.getAttribute('data-del'))};
  });
}
function renderAll(){renderHeader();renderBanner();renderSummary();renderWall();renderCalendar();renderTodoList();renderShopping()}

/* ================== 留言操作 ================== */
var composeToSel=['all'];
function openCompose(){
  if(!canWrite())return;
  composeToSel=['all'];$('composeText').value='';$('composePin').checked=false;
  $('pinRow').classList.toggle('hidden',!isAdmin());
  renderComposeChips();
  $('composeMask').classList.remove('hidden');
  setTimeout(function(){$('composeText').focus()},100);
}
function renderComposeChips(){
  var box=$('composeTo');box.innerHTML='';
  var opts=[{id:'all',name:'全家'}].concat(state.members.filter(function(m){return m.id!==currentUser}));
  opts.forEach(function(o){
    var c=document.createElement('button');
    c.className='chip'+(composeToSel.indexOf(o.id)>-1?' on':'');
    c.textContent=o.name;
    c.onclick=function(){
      if(o.id==='all'){composeToSel=['all']}
      else{
        var i=composeToSel.indexOf('all');if(i>-1)composeToSel.splice(i,1);
        var j=composeToSel.indexOf(o.id);
        if(j>-1)composeToSel.splice(j,1);else composeToSel.push(o.id);
        if(!composeToSel.length)composeToSel=['all'];
      }
      renderComposeChips();
    };
    box.appendChild(c);
  });
}
function sendCompose(){
  var text=$('composeText').value.trim();
  if(!text){toast('留言內容不能是空的喔');return}
  if(!canWrite())return;
  var msg={
    id:genId('msg'),author:currentUser,content:text,
    to:composeToSel.slice(),pinned:(isAdmin()&&$('composePin').checked)?'Y':'',
    readBy:[currentUser],time:nowStr(),status:'active'
  };
  state.messages.push(msg);saveLocal();renderAll();
  $('composeMask').classList.add('hidden');
  pushWrite('addMessage',msg);
  toast('留言已貼上牆 📌');
}
function delMessage(id){
  if(!canWrite())return;
  if(!confirm('確定要刪除這張留言嗎？'))return;
  for(var i=0;i<state.messages.length;i++){
    if(state.messages[i].id===id){state.messages[i].status='deleted';break}
  }
  saveLocal();renderAll();
  pushWrite('updateMessage',{id:id,patch:{status:'deleted'}});
}
function markVisibleRead(){
  var ids=[];
  visibleMessages().forEach(function(m){
    if(m.author===currentUser)return;
    m.readBy=m.readBy||[];
    if(m.readBy.indexOf(currentUser)===-1){m.readBy.push(currentUser);ids.push(m.id)}
  });
  if(ids.length){saveLocal();renderAll();if(GAS_URL&&_gasLoaded)pushWrite('markRead',{ids:ids})}
}

/* ================== 行事曆 ================== */
var calYear, calMonth; // calMonth: 0-11
(function initCal(){var d=new Date();calYear=d.getFullYear();calMonth=d.getMonth();})();

function activeEvents(){return state.events.filter(function(e){return e.status!=='deleted'})}
function activeAnni(){return state.anniversaries.filter(function(a){return a.status!=='deleted'})}
function eventWhoIds(e){var m=e.member;if(Array.isArray(m))return m.length?m:['all'];return splitCsv(m,['all'])}
function splitCsv(s,fallback){s=String(s||'').trim();if(!s)return fallback;var arr=s.split(',').map(function(x){return x.trim()}).filter(String);return arr.length?arr:fallback}

// 該西曆年月日是否為某紀念日的發生日（考慮每年重複）
function anniOccursOn(a,y,mo,day){
  if(!a.date)return false;var p=a.date.split('-');if(p.length<3)return false;
  var repeat=(a.repeat==='Y'||a.repeat===true||a.repeat==='true');
  if(repeat)return (+p[1]-1)===mo&&(+p[2])===day;
  return (+p[0])===y&&(+p[1]-1)===mo&&(+p[2])===day;
}
function anniListOnDate(y,mo,day){return activeAnni().filter(function(a){return anniOccursOn(a,y,mo,day)})}

function renderCalendar(){
  $('calTitle').textContent=calYear+' 年 '+(calMonth+1)+' 月';
  var first=new Date(calYear,calMonth,1);
  var startOffset=first.getDay(); // 0=Sun
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var daysInPrevMonth=new Date(calYear,calMonth,0).getDate();
  var todayD=new Date(),todayStr2=todayD.getFullYear()+'-'+pad(todayD.getMonth()+1)+'-'+pad(todayD.getDate());

  var cells=[];
  for(var i=0;i<startOffset;i++){
    var pd=daysInPrevMonth-startOffset+1+i;
    cells.push({day:pd,other:true,y:calMonth===0?calYear-1:calYear,mo:calMonth===0?11:calMonth-1});
  }
  for(var d=1;d<=daysInMonth;d++)cells.push({day:d,other:false,y:calYear,mo:calMonth});
  var rest=(7-(cells.length%7))%7;
  for(var j=1;j<=rest;j++)cells.push({day:j,other:true,y:calMonth===11?calYear+1:calYear,mo:calMonth===11?0:calMonth+1});

  var grid=$('calGrid');grid.innerHTML='';
  cells.forEach(function(c){
    var dateStr=c.y+'-'+pad(c.mo+1)+'-'+pad(c.day);
    var evs=activeEvents().filter(function(e){return e.date===dateStr});
    var annis=anniListOnDate(c.y,c.mo,c.day);
    var cls='cal-day'+(c.other?' other':'')+(dateStr===todayStr2?' today':'')+(annis.length?' has-anni':'');
    var dotIds={};
    evs.forEach(function(e){eventWhoIds(e).forEach(function(id){dotIds[id]=1})});
    var dots=Object.keys(dotIds).slice(0,6).map(function(id){
      if(id==='all')return'<span class="cal-dot all"></span>';
      return '<span class="cal-dot" style="background:'+memberOf(id).color+'"></span>';
    }).join('');
    var cell=document.createElement('button');
    cell.className=cls;
    cell.innerHTML='<span class="cal-num">'+c.day+'</span>'+
      (annis.length?'<span class="cal-anni-mark">🎂</span>':'')+
      (dots?'<span class="cal-dots">'+dots+'</span>':'');
    cell.onclick=function(){openDayDetail(dateStr,c.y,c.mo,c.day)};
    grid.appendChild(cell);
  });

  var lg=$('calLegend');
  lg.innerHTML=state.members.map(function(m){
    return '<span class="lg"><span class="dot" style="background:'+m.color+'"></span>'+esc(m.name)+'</span>';
  }).join('')+'<span class="lg"><span class="dot" style="background:'+getComputedStyle(document.documentElement).getPropertyValue('--ink')+'"></span>全家</span>';
}

$('calPrev').onclick=function(){calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar()};
$('calNext').onclick=function(){calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar()};
$('calToday').onclick=function(){var d=new Date();calYear=d.getFullYear();calMonth=d.getMonth();renderCalendar()};

/* ---- 日期詳情 ---- */
var dayCtx={dateStr:'',y:0,mo:0,day:0};
function openDayDetail(dateStr,y,mo,day){
  dayCtx={dateStr:dateStr,y:y,mo:mo,day:day};
  var wk=['日','一','二','三','四','五','六'];
  var dow=new Date(y,mo,day).getDay();
  $('dayModalTitle').textContent=y+' 年 '+(mo+1)+' 月 '+day+' 日（'+wk[dow]+'）';

  var annis=anniListOnDate(y,mo,day);
  $('dayAnniBanner').innerHTML=annis.length?annis.map(function(a){
    return '<div class="banner">🎂 '+esc(a.name)+'</div>';
  }).join(''):'';

  var evs=activeEvents().filter(function(e){return e.date===dateStr}).sort(function(a,b){return (a.title||'').localeCompare(b.title||'')});
  var box=$('dayEventList');
  if(!evs.length){box.innerHTML='<div class="item-note" style="text-align:center;padding:14px 0">這天還沒有安排行程</div>'}
  else{
    box.innerHTML='';
    evs.forEach(function(e){
      var who=eventWhoIds(e);
      var whoHtml=who.indexOf('all')>-1?'<span class="dot" style="background:var(--ink)">全</span>':
        who.map(function(id){var m=memberOf(id);return '<span class="dot" style="background:'+m.color+'">'+esc(m.name.charAt(0))+'</span>'}).join('');
      var canEdit=isAdmin()||e.author===currentUser;
      var div=document.createElement('div');
      div.className='item-card';
      div.innerHTML='<div class="item-top"><div class="item-title">'+esc(e.title)+'</div><div class="item-who">'+whoHtml+'</div></div>'+
        (e.note?'<div class="item-note">'+esc(e.note)+'</div>':'')+
        (canEdit?'<div class="item-foot"><button class="lnk" data-edit-event="'+esc(e.id)+'">✏️ 編輯</button></div>':'');
      box.appendChild(div);
    });
    box.querySelectorAll('[data-edit-event]').forEach(function(b){

function daysUntil(a){
  var today=new Date();today.setHours(0,0,0,0);
  var p=a.date.split('-');if(p.length<3)return null;
  var repeat=(a.repeat==='Y'||a.repeat===true||a.repeat==='true');
  var d=new Date(today.getFullYear(),+p[1]-1,+p[2]);
  if(repeat){if(d<today)d=new Date(today.getFullYear()+1,+p[1]-1,+p[2])}
  else{d=new Date(+p[0],+p[1]-1,+p[2]);if(d<today)return{diff:null,past:true}}
  return{diff:Math.round((d-today)/86400000),past:false};
}
function renderAnniModal(){
  var list=activeAnni().slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'')});
  var box=$('anniList');
  if(!list.length){box.innerHTML='<div class="item-note" style="text-align:center;padding:14px 0">還沒有設定紀念日</div>'}
  else{
    box.innerHTML='';
    list.forEach(function(a){
      var du=daysUntil(a);
      var countHtml=du.past?'<span class="item-anni-count anni-past">已過</span>':
        (du.diff===0?'<span class="item-anni-count">今天！</span>':'<span class="item-anni-count">'+du.diff+' 天後</span>');
      var canDel=isAdmin()||a.author===currentUser;
      var div=document.createElement('div');
      div.className='item-card';
      div.innerHTML='<div class="item-top"><div class="item-title">'+esc(a.name)+'</div>'+countHtml+'</div>'+
        '<div class="item-note">'+esc(a.date)+(a.repeat==='Y'||a.repeat===true||a.repeat==='true'?'（每年重複）':'（單次）')+'</div>'+
        (canDel?'<div class="item-foot"><button class="lnk" data-del-anni="'+esc(a.id)+'">🗑 刪除</button></div>':'');
      box.appendChild(div);
    });
    box.querySelectorAll('[data-del-anni]').forEach(function(b){
      b.onclick=function(){delAnniversary(b.getAttribute('data-del-anni'))};
    });
  }
  // 新增區塊：僅家長可新增（家庭共同紀念日交由家長維護，孩子仍可在留言板提醒家長新增）
  var addBox=$('anniAddArea');
  if(!isAdmin()){addBox.innerHTML='<div class="item-note" style="margin-top:10px">紀念日由爸爸媽媽新增與管理喔</div>';return}
  addBox.innerHTML=
    '<div class="field-lab">新增紀念日</div>'+
    '<input type="text" id="anniName" maxlength="30" placeholder="名稱，例如：翔翔生日" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px;font-family:inherit;font-size:14px;background:var(--paper);margin-bottom:8px">'+
    '<input type="date" id="anniDate" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px;font-family:inherit;font-size:14px;background:var(--paper);margin-bottom:8px">'+
    '<label class="pin-row"><input type="checkbox" id="anniRepeat" checked>🔁 每年重複（生日、紀念日等）</label>'+
    '<div class="modal-actions"><button class="btn-send" id="btnSaveAnni" style="flex:1">新增</button></div>';
  $('btnSaveAnni').onclick=function(){
    var name=$('anniName').value.trim(),date=$('anniDate').value;
    if(!name){toast('請輸入紀念日名稱');return}
    if(!date){toast('請選擇日期');return}
    if(!canWrite())return;
    var obj={id:genId('anni'),name:name,date:date,repeat:$('anniRepeat').checked?'Y':'',author:currentUser,status:'active'};
    state.anniversaries.push(obj);saveLocal();renderAll();renderCalendar();renderAnniModal();
    pushWrite('addAnniversary',obj);
    toast('紀念日已新增 🎂');
  };
}

/* ================== 待辦與家事分工 ================== */
var WEEKDAY_LABEL=['日','一','二','三','四','五','六'];
function activeTodos(){return state.todos.filter(function(t){return t.status!=='deleted'})}
function todoWhoIds(t){return t.assignee==='all'?['all']:[t.assignee]}
function sameWeek(ts,ref){
  if(!ts)return false;
  var a=new Date(ts.slice(0,10)+'T00:00:00'),b=new Date(ref);
  var mondayOf=function(d){var x=new Date(d);var wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x};
  return mondayOf(a).getTime()===mondayOf(b).getTime();
}
function isTodoDoneNow(t){
  if(t.done!=='Y')return false;
  if(t.repeat==='')return true; // 一次性：完成即完成
  return sameWeek(t.doneTime,new Date()); // 每週重複：僅本週有效
}
function renderTodoList(){
  var list=activeTodos();
  var doneList=[],activeList=[];
  list.forEach(function(t){(isTodoDoneNow(t)?doneList:activeList).push(t)});
  activeList.sort(function(a,b){return (a.title||'').localeCompare(b.title||'')});
  var box=$('todoActiveList');
  if(!activeList.length){box.innerHTML='<div class="empty-box"><span class="big">🎉</span>目前沒有待辦事項<br>按右上角「＋ 新增」加一個吧</div>'}
  else{box.innerHTML='';activeList.forEach(function(t){box.appendChild(buildTodoRow(t,false))})}
  var doneWrap=$('todoDoneWrap');
  if(!doneList.length){doneWrap.innerHTML='';return}
  doneWrap.innerHTML='<div class="section-sub">已完成</div>';
  doneList.forEach(function(t){doneWrap.appendChild(buildTodoRow(t,true))});
}
function buildTodoRow(t,isDone){
  var who=todoWhoIds(t);
  var whoHtml=who[0]==='all'?'<span class="dot" style="background:var(--ink)">全</span>':
    who.map(function(id){var m=memberOf(id);return '<span class="dot" style="background:'+m.color+'">'+esc(m.name.charAt(0))+'</span>'}).join('');
  var repeatBadge=t.repeat!==''?'🔁 每週'+WEEKDAY_LABEL[+t.repeat]:'';
  var canEdit=isAdmin()||t.author===currentUser;
  var canCheck=isAdmin()||t.assignee===currentUser||t.assignee==='all';
  var div=document.createElement('div');
  div.className='todo-row'+(isDone?' done':'');
  div.innerHTML=
    '<button class="todo-check'+(isDone?' on':'')+'" data-toggle="'+esc(t.id)+'">'+(isDone?'✓':'')+'</button>'+
    '<div class="todo-body"><div class="todo-title">'+esc(t.title)+'</div>'+
    '<div class="todo-meta"><span class="todo-who">'+whoHtml+'</span>'+
    (repeatBadge?'<span class="todo-badge">'+repeatBadge+'</span>':'')+'</div></div>'+
    (canEdit?'<button class="todo-edit" data-edit="'+esc(t.id)+'">✏️</button>':'');
  var chk=div.querySelector('[data-toggle]');
  if(!canCheck){chk.style.opacity=.35;chk.style.pointerEvents='none'}
  else chk.onclick=function(){toggleTodo(t.id)};
  var editBtn=div.querySelector('[data-edit]');
  if(editBtn)editBtn.onclick=function(){openTodoForm(t)};
  return div;
}
function findTodo(id){for(var i=0;i<state.todos.length;i++)if(state.todos[i].id===id)return state.todos[i];return null}
function toggleTodo(id){
  if(!canWrite())return;
  var t=findTodo(id);if(!t)return;
  var nowDone=isTodoDoneNow(t);
  var patch;
  if(nowDone){t.done='';patch={done:''}}
  else{t.done='Y';t.doneTime=nowStr();patch={done:'Y',doneTime:t.doneTime}}
  saveLocal();renderTodoList();renderSummary();
  pushWrite('updateTodo',{id:id,patch:patch});
}
var todoWhoSel='all',todoRepeatSel='',editingTodoId=null;
function openTodoForm(existing){
  if(!canWrite())return;
  editingTodoId=existing?existing.id:null;
  $('todoModalTitle').textContent=existing?'編輯待辦':'新增待辦';

/* ================== 購物清單 ================== */
var SHOP_CATS=[{id:'食材',ic:'🥬'},{id:'日用',ic:'🧻'},{id:'文具',ic:'✏️'},{id:'其他',ic:'📦'}];
var shopCatSel='食材';
function activeShop(){return state.shopping.filter(function(s){return s.status!=='deleted'})}
function renderShopCatChips(){
  var box=$('shopCatRow');box.innerHTML='';
  SHOP_CATS.forEach(function(c){
    var b=document.createElement('button');
    b.className='shop-cat-chip'+(shopCatSel===c.id?' on':'');
    b.textContent=c.ic+' '+c.id;
    b.onclick=function(){shopCatSel=c.id;renderShopCatChips()};
    box.appendChild(b);
  });
}
function renderShopping(){
  var list=activeShop();
  var box=$('shopList');
  if(!list.length){box.innerHTML='<div class="empty-box"><span class="big">🛒</span>購物清單是空的<br>上面輸入品項按 Enter 就能加入</div>';return}
  box.innerHTML='';
  SHOP_CATS.forEach(function(c){
    var items=list.filter(function(s){return (s.category||'其他')===c.id});
    if(!items.length)return;
    items.sort(function(a,b){
      var ab=a.bought==='Y',bb=b.bought==='Y';
      if(ab!==bb)return ab?1:-1;
      return (b.time||'').localeCompare(a.time||'');
    });
    var head=document.createElement('div');
    head.className='shop-group-title';head.textContent=c.ic+' '+c.id;
    box.appendChild(head);
    items.forEach(function(s){
      var bought=s.bought==='Y';
      var canDel=isAdmin()||s.proposer===currentUser;
      var row=document.createElement('div');
      row.className='shop-item'+(bought?' bought':'');
      row.innerHTML=
        '<button class="todo-check'+(bought?' on':'')+'" data-shop-toggle="'+esc(s.id)+'">'+(bought?'✓':'')+'</button>'+
        '<div class="shop-name">'+esc(s.name)+'</div>'+
        (canDel?'<button class="shop-del" data-shop-del="'+esc(s.id)+'">🗑</button>':'');
      box.appendChild(row);
    });
  });
  box.querySelectorAll('[data-shop-toggle]').forEach(function(b){
    b.onclick=function(){toggleShop(b.getAttribute('data-shop-toggle'))};
  });
  box.querySelectorAll('[data-shop-del]').forEach(function(b){
    b.onclick=function(){delShopItem(b.getAttribute('data-shop-del'))};
  });
}
function findShop(id){for(var i=0;i<state.shopping.length;i++)if(state.shopping[i].id===id)return state.shopping[i];return null}
function toggleShop(id){
  if(!canWrite())return;

  pushWrite('updateShopItem',{id:id,patch:{bought:s.bought}});
